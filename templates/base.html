<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BookVault{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <a href="{{ url_for('index') }}" class="logo-link">
                <i class="bi bi-book-half logo-icon"></i>
                <span class="logo-text">BookVault</span>
            </a>
        </div>

        <nav class="sidebar-nav">
            <a href="{{ url_for('index') }}"
               class="sidebar-link {% if request.endpoint == 'index' %}active{% endif %}">
                <i class="bi bi-books"></i>
                <span>Library</span>
            </a>
            <a href="{{ url_for('recommendations') }}"
               class="sidebar-link {% if request.endpoint == 'recommendations' %}active{% endif %}">
                <i class="bi bi-compass"></i>
                <span>Discover</span>
            </a>
            <a href="{{ url_for('stats') }}"
               class="sidebar-link {% if request.endpoint == 'stats' %}active{% endif %}">
                <i class="bi bi-bar-chart-line"></i>
                <span>Statistics</span>
            </a>
            <a href="{{ url_for('manage_tags') }}"
               class="sidebar-link {% if request.endpoint == 'manage_tags' %}active{% endif %}">
                <i class="bi bi-tags"></i>
                <span>Tags</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="theme-btn" id="themeToggle">
                <i class="bi bi-sun" id="themeIcon"></i>
                <span id="themeLabel">Light mode</span>
            </button>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="topbar">
            <button class="topbar-icon-btn" id="sidebarToggle">
                <i class="bi bi-list"></i>
            </button>
            <a href="{{ url_for('index') }}" class="topbar-brand">
                <i class="bi bi-book-half"></i>
                BookVault
            </a>
            <button class="topbar-icon-btn" id="themeToggleMobile">
                <i class="bi bi-sun" id="themeIconMobile"></i>
            </button>
        </header>

        <main class="page-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const html = document.documentElement;
        const themeIcon = document.getElementById('themeIcon');
        const themeIconMobile = document.getElementById('themeIconMobile');
        const themeLabel = document.getElementById('themeLabel');

        const saved = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-bs-theme', saved);
        applyThemeUI(saved);

        function applyThemeUI(theme) {
            const isDark = theme === 'dark';
            const icon = isDark ? 'bi bi-sun' : 'bi bi-moon-stars';
            themeIcon.className = icon;
            if (themeIconMobile) themeIconMobile.className = icon;
            if (themeLabel) themeLabel.textContent = isDark ? 'Light mode' : 'Dark mode';
        }

        function toggleTheme() {
            const next = html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-bs-theme', next);
            localStorage.setItem('theme', next);
            applyThemeUI(next);
        }

        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        document.getElementById('themeToggleMobile').addEventListener('click', toggleTheme);

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');

        document.getElementById('sidebarToggle').addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
            document.body.classList.toggle('sidebar-open');
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.body.classList.remove('sidebar-open');
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
